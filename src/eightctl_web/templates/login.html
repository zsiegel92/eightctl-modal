<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eight Sleep Login</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        background: #fff;
        color: #000;
        font-family: serif;
        font-size: 18px;
        line-height: 1.3;
      }

      .wrap {
        max-width: 420px;
        margin: 0 auto;
        border: 2px solid #000;
        padding: 14px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 26px;
      }

      p {
        margin: 0 0 10px;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        font-weight: bold;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 2px solid #000;
        font-size: 18px;
        background: #fff;
        color: #000;
      }

      button {
        width: 100%;
        margin-top: 14px;
        padding: 12px;
        border: 2px solid #000;
        background: #000;
        color: #fff;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
      }

      input:focus,
      button:focus {
        outline: 2px solid #000;
        outline-offset: 2px;
      }

      button:hover {
        background: #222;
      }

      .error {
        margin-bottom: 10px;
        padding: 8px;
        border: 2px solid #000;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Eight Sleep</h1>
      <p>Sign in with the deploy account.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Log In</button>
      </form>
    </main>
  </body>
</html>
